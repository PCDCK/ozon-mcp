  extracted_from: curated

- operation_id: ProductAPI_GetProductInfoPrices
  api: seller
  title: price_indexes полнее чем в /v3/product/info/list
  description: |
    price_indexes в /v5/product/info/prices содержит вложенные объекты
    external_index_data, ozon_index_data, self_marketplaces_index_data
    с числовым полем price_index_value (float). В /v3/product/info/list
