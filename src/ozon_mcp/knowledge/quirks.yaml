- operation_id: ProductAPI_GetProductInfoPrices
  api: seller
  title: marketing_seller_price — реальная цена покупателя
  description: |
    price.marketing_seller_price — цена с учётом акций продавца, которую видит
    покупатель. price.price — цена продавца до акций Ozon. price.old_price —
    зачёркнутая цена (до скидок). Для отображения "цена продажи" используй
    marketing_seller_price, а не price. Разница может быть существенной:
    price=7690, marketing_seller_price=7290.
    Live-verified 2026-04-13.
  severity: warning
  extracted_from: curated

- operation_id: ProductAPI_GetProductInfoPrices
  api: seller
  title: net_price — себестоимость, указанная продавцом вручную
  description: |
    price.net_price — себестоимость товара, которую продавец сам вводит
    в карточке товара на Ozon. Это не расчётное поле. Может быть 0 или null
    если продавец не заполнил. Для расчёта маржинальности используй формулу:
    маржа = (marketing_seller_price - commission% - net_price) / marketing_seller_price.
    Комиссия = marketing_seller_price × sales_percent_fbo (или fbs) / 100.
    Логистика и эквайринг не учитываются в этих полях.
  severity: info
  extracted_from: curated

- operation_id: DescriptionCategoryAPI_GetTree
  api: seller
  title: дерево категорий рекурсивное, нужен flatten
  description: |
    /v1/description-category/tree возвращает вложенное дерево с полями
    description_category_id, category_name, type_name, children[].
    Для маппинга category_id → name нужно рекурсивно обойти все children
    и построить плоский dict. Листовые узлы имеют type_id + type_name.
    category_name может быть общей ("Бытовая техника"), type_name — конкретной
    ("Пылесосы"). Для отображения пользователю предпочтительнее category_name
    из leaf-узла, где есть description_category_id совпадающий с товаром.
    Live-verified 2026-04-13: 8 уникальных категорий из 31 товара.
  severity: info
  extracted_from: curated

- operation_id: ProductAPI_GetProductInfoList
  api: seller
  title: stocks.present включает reserved
  description: |
    В ответе stocks[].present — это ОБЩЕЕ количество на складе, включая
    зарезервированное (reserved). Доступный остаток = present - reserved.
    Для отображения "сколько можно продать" вычитай reserved.
    Пример: present=9464, reserved=13, доступно=9451.
    Live-verified 2026-04-13.
  severity: warning
  extracted_from: curated

