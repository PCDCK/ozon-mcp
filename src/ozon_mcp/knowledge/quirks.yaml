# --- Phase 3 additions (2026-04-17): business context for the key methods ---
#
# These quirks are NOT about edge cases — they're about *why* a method
# matters and *when* to reach for it. Claude needs both kinds of context:
# the technical gotcha (already covered above) and the business intent.

- operation_id: AnalyticsAPI_StocksTurnover
  api: seller
  title: "Бизнес-контекст: главная метрика для планирования закупок"
  description: |
    Один вызов даёт по каждому SKU: ads (average daily sales),
    idc (inventory days cover — сколько дней хватит остатка), turnover_grade
    (DEFICIT / OPTIMAL / EXCESS / NO_SALES).
  business_context: |
    Главная метрика для планирования закупок. idc=8 значит остаток
    закончится через 8 дней при текущей скорости продаж. turnover_grade=
    DEFICIT — нужна срочная допоставка. EXCESS (idc > 120) — Ozon начнёт
    начислять плату за хранение. NO_SALES — товар не продаётся, кандидат
    на снятие с продажи.
  when_to_use:
    - Ежедневный мониторинг OOS-рисков
    - Планирование поставок FBO раз в день
    - Выявление затоваренных позиций
    - Определение SKU-кандидатов на снятие с продажи
  common_mistakes:
    - Вызывать в цикле без задержки — гарантированный 429 (1 req/min лимит)
    - Считать turnover_grade=CRITICAL только дефицитом — бывает и оверсток
    - Игнорировать ads=0 в DEFICIT — товар может быть просто новый
  severity: info
  extracted_from: curated

- operation_id: RatingAPI_RatingSummaryV1
  api: seller
  title: "Бизнес-контекст: метрики здоровья кабинета от Ozon"
  description: |
    Read-only без параметров. Возвращает группы рейтингов
    (Выполнение заказов, Качество сервиса, Цены) с current_value, status
    (OK/WARNING/CRITICAL) и premium_scores с суммой штрафов.
  business_context: |
    Если любой рейтинг достигает WARNING или CRITICAL — Ozon снижает
    видимость товаров в выдаче. На CRITICAL может временно
    блокировать продажи или начислять штрафные баллы.
    penalty_score_exceeded=true — превышение лимита штрафов, требуется
    немедленная реакция (продавец на грани блокировки).
    Самые частые проблемы: rating_on_time (доставка вовремя),
    rating_review_avg_score (отзывы), rating_price_index (индекс цен).
  when_to_use:
    - Ежедневный health-check кабинета
    - Диагностика падения продаж (часто корень — упавший рейтинг)
    - Алерты "ratings.status=CRITICAL" в мониторинге
  common_mistakes:
    - Игнорировать WARNING — статусы быстро деградируют до CRITICAL
    - Не сохранять историю рейтингов — тренд важнее снимка
    - Реагировать только на ratings, забывая про penalty_score
  severity: info
  extracted_from: curated

- operation_id: ProductAPI_GetProductRatingBySku
  api: seller
  title: "Бизнес-контекст: контент-рейтинг и поисковое ранжирование"
  description: |
    Контент-рейтинг карточки 0-100 + improve_attributes — конкретный
    список характеристик которые надо заполнить чтобы рейтинг вырос.
  business_context: |
    Контент-рейтинг напрямую влияет на ранжирование в поиске Ozon.
    rating < 40 — карточка почти не показывается даже на релевантных
    запросах. rating 40-70 — посредственно, простор для роста. rating
    > 90 — отлично. Каждые +10 к рейтингу заметно улучшают позиции.
    improve_attributes содержит конкретный actionable список — не
    нужно гадать что заполнять.
  when_to_use:
    - Аудит контента нового ассортимента после массового импорта
    - Диагностика низких продаж при достаточном остатке и нормальной цене
    - Регулярный (раз в неделю) анализ для контент-менеджеров
  common_mistakes:
    - Ждать мгновенного эффекта — рейтинг пересчитывается раз в сутки
    - Заполнять только image-атрибуты — характеристики дают больше баллов
    - Игнорировать improve_at_least — это число баллов которое можно поднять
  severity: info
  extracted_from: curated

- operation_id: ProductAPI_GetProductInfoPrices
  api: seller
  title: "Бизнес-контекст: ценообразование и индекс рыночных цен"
  description: |
    Цены, комиссии Ozon (sales_percent_fbo/fbs), price_indexes (числовой
    price_index_value и color_index ∈ {SUPER, GOOD, AVERAGE, RED, YELLOW,
    WITHOUT_INDEX}), marketing_actions (активные акции).
  business_context: |
    color_index=RED означает что цена выше рынка — Ozon сильно понижает
    позицию в выдаче. YELLOW — заметно дороже конкурентов, тоже минус
    к ранжированию. SUPER/GOOD — конкурентная цена. WITHOUT_INDEX — Ozon
    не нашёл аналогов для сравнения, не ошибка. price_index_value > 1.0
    — дороже рынка, < 1.0 — дешевле. marketing_actions показывает
    активные акции по товару — там можно скорректировать цену без
    изменения базовой.
  when_to_use:
    - Ежедневный мониторинг ценовой конкурентности
    - Подготовка к промо-кампаниям и распродажам
    - Расчёт юнит-экономики (нужны реальные комиссии)
    - Проверка перед массовой корректировкой цен
  common_mistakes:
    - Сравнивать price без учёта marketing_seller_price (реальная цена покупателя)
    - Игнорировать min_price — Ozon не примет цену ниже этого порога
    - Считать комиссию фиксированной — sales_percent_fbo меняется по категориям
    - Менять базовую цену не учитывая активные акции
  severity: info
  extracted_from: curated

- operation_id: AnalyticsAPI_AnalyticsStocks
  api: seller
  title: "Бизнес-контекст: остатки в разрезе складов FBO"
  description: |
    Premium-метод. Возвращает items с warehouse_name, sku,
    available_stock_count, valid_stock_count (не просрочено),
    expiring_stock_count, excess_stock_count, idc_cluster.
  business_context: |
    Это единственный способ узнать остаток ПО КАЖДОМУ СКЛАДУ FBO,
    а не суммарный. expiring_stock_count > 0 — критично для FMCG /
    лекарств, истекает срок годности. excess_stock_count > 0 — излишки,
    Ozon начнёт списывать стоимость хранения. idc_cluster < 14 —
    дефицит на конкретном складе (даже если суммарно по всем складам
    остаток нормальный). Используй для кросс-складского анализа:
    избыток на A + дефицит на B → переброска или допоставка только на B.
  when_to_use:
    - Планирование пополнения складов FBO раздельно
    - Реакция на сигналы Ozon о платном хранении
    - Контроль FMCG / sunset-категорий со сроком годности
    - Аналитика логистических затрат по регионам
  common_mistakes:
    - Считать stock = sum(present по всем складам) — не вычитает резервы и просрочку
    - Игнорировать expiring_stock для категорий со сроком годности
    - Применять для FBS-складов — там данных нет, только FBO
  severity: info
  extracted_from: curated

- operation_id: PostingAPI_GetFboPostingList
  api: seller
  title: "Бизнес-контекст: реальная выручка из заказов FBO"
  description: |
    FBO-отправления (заказы). Каждое — это пользовательский чек.
    Включай with.analytics_data и with.financial_data чтобы получить
    выручку, комиссии и геоданные одним round-trip.
  business_context: |
    Главный источник выручки для FBO-продавцов. financial_data.posting_
    services даёт разбивку комиссий Ozon по конкретному заказу — это
    единственный точный источник для расчёта маржинальности (FinanceAPI/
    transaction агрегирует, но с задержкой 24h). analytics_data.
    warehouse_name + city позволяет строить геораспределение спроса.
    in_process_at — момент создания заказа, важно для time-series выручки.
  when_to_use:
    - Real-time дашборд заказов (свежее чем FinanceAPI)
    - Расчёт маржи на уровне отдельного заказа
    - Геоаналитика спроса по регионам и складам
    - Cohort-анализ повторных покупателей (по customer_id)
  common_mistakes:
    - Не включать with.financial_data — потом гонять ещё один запрос
    - Брать price из products[].price без учёта commission — это валовая выручка
    - Считать выручку до status=delivered — отмены искажают картину
    - Игнорировать cancelled-заказы — нужно для расчёта cancel rate
  severity: info
  extracted_from: curated

