  title: Возвращает только отчёты, сгенерированные через интерфейс
  description: |
    Метод НЕ показывает отчёты, созданные через API (например через SubmitRequest).
    Те доступны через /api/client/statistics/{UUID} по ID запроса. Для аудита
    всех отчётов нужно держать собственный реестр UUID-ов на стороне клиента.
  severity: info
  extracted_from: curated

- section: Premium-методы
  api: seller
  title: PREMIUM_PLUS открывает большинство аналитических методов
  description: |
    На реальном PREMIUM_PLUS аккаунте /v1/analytics/data работает с расширенным
    набором dimensions/metrics и год истории. PREMIUM_PRO добавляет ещё несколько
    эксклюзивных метрик но это уже редкий случай.
  severity: info
  extracted_from: curated

- operation_id: ProductAPI_GetProductInfoList
  api: seller
  title: Несуществующий product_id возвращает 200, не 404
  description: |
    Если передать в product_id массив с несуществующими идентификаторами, метод
    вернёт HTTP 200 с пустым items. Это convention Ozon — отсутствие данных не
    считается ошибкой. Не полагайся на 404 как сигнал — проверяй items.length.
  severity: warning
  extracted_from: curated

- operation_id: SellerAPI_SellerInfo
  api: seller
  title: Поля рейтингов могут быть null вопреки swagger
  description: |
    На некоторых аккаунтах элементы массива ratings содержат past_value=null,
    хотя schema требует object. Это inconsistency на стороне Ozon — твоя
    клиентская валидация должна допускать null в past_value/current_value
    или фильтровать такие записи перед сохранением.
  severity: warning
  extracted_from: curated

- operation_id: AnalyticsAPI_AnalyticsGetData
  api: seller
  title: Dimension и metrics — массивы строк, не enum
  description: |
    Swagger Ozon содержит баг — поля dimension и metrics задекларированы как
    array of strings без enum, хотя в описании перечислены допустимые значения.
    Передавай только значения из описания метода (sku, day, week, revenue,
    ordered_units и т.д.), иначе получишь 400.
  severity: info
  extracted_from: curated

- operation_id: FinanceAPI_FinanceTransactionListV3
  api: seller
  title: Лимит периода 1 месяц подтверждён live
  description: |
    Передача filter.date с диапазоном больше 30 дней возвращает 400
    "Request validation error: too long period, only one month allowed".
    Для исторической загрузки итерируй помесячно.
  severity: critical
  extracted_from: curated

- operation_id: PostingAPI_GetFboPostingList
  api: seller
  title: limit > 1000 → 400 InvalidArgument
  description: |
    Передача limit=5000 (или любого > 1000) возвращает
    "invalid GetSellerAPIPostingListV2Request.Limit: value must be inside range (0, 1000]".
    Сообщение Ozon содержит точное правило, можно показать пользователю.
  severity: critical
  extracted_from: curated

# --- Phase 2 audit findings (2026-04-12) ---

- operation_id: ReportAPI_ReportList
  api: seller
  title: report_type приходит в lowercase, но enum в swagger в UPPER_CASE
  description: |
    Реальный ответ возвращает report_type='seller_postings' (lowercase),
    но swagger декларирует enum только из ['SELLER_PRODUCTS','SELLER_TRANSACTIONS',...]
    в UPPER_CASE. Это inconsistency в swagger Ozon — клиент должен принимать
    обе формы и нормализовать. Validation против extracted schema провалится.
  severity: warning
  extracted_from: curated

- operation_id: GetLimitsList
  api: performance
  title: objectType может быть BRAND_SHELF — отсутствует в enum swagger
  description: |
    Реальный ответ содержит limits[].objectType='BRAND_SHELF', но swagger
    декларирует enum только ['SKU','SEARCH_PROMO']. Это пропущенное значение
    в swagger Ozon. Принимайте любое строковое значение для objectType.
  severity: warning
  extracted_from: curated

- operation_id: ListCampaigns
  api: performance
  title: placement field может приходить как пустой массив вместо строки
  description: |
    Swagger декларирует placement как string, но реальный ответ
    list[N].placement иногда содержит пустой массив `[]` вместо строки.
    Это type mismatch в swagger Ozon. Парсеры должны быть defensive.
  severity: warning
  extracted_from: curated

- operation_id: UtilizationInfo
  api: seller
  title: utilization_settings.utilization_price_defects может быть null
  description: |
    Поле декларировано как object, но реально возвращает null когда
    настройки утилизации не заданы. Обрабатывай как nullable object.
  severity: info
  extracted_from: curated

- operation_id: RFBSReturnsAPI_ReturnsRfbsListV2
  api: seller
  title: returns может быть пустым массивом вместо object
  description: |
    Когда возвратов нет, поле returns в ответе приходит как `[]` (пустой
    массив), хотя swagger декларирует его как object. Это convention Ozon —
    проверяй isinstance перед обращением к полям.
  severity: warning
  extracted_from: curated

- title: Section "Доставка" имеет slow first call (1300+ ms)
  description: |
    Phase 2 audit зафиксировал latency >1300ms на первом вызове методов
    в секции "Доставка". Это TLS handshake + connection pool warmup, не баг.
    Последующие вызовы на том же клиенте — 60-120ms. Если у тебя first-call-time
    важен, прогрей соединение dummy-вызовом /v1/seller/info на старте процесса.
  severity: info
  extracted_from: curated

- title: PERMISSION_DENIED на FBP-методах требует подключения к программе
  description: |
    FBP (Fulfillment by Partner) — отдельная программа Ozon, доступ
    выдаётся индивидуально. На обычных аккаунтах ВСЕ FBP-методы возвращают
    403 PermissionDenied "access denied". Это не баг, проверяй включение
    в личном кабинете перед интеграцией. Список затронутых методов в каталоге:
    FbpAPI_FbpOrderList, FbpAPI_FbpCheckActState, FbpWarehouseList, и т.д.
  severity: warning
  extracted_from: curated

- title: Многие read-методы требуют непустой filter, хотя swagger required не помечает
  description: |
    Phase 2 audit выявил >25 методов которые в swagger имеют filter как
    optional, но runtime-валидация Ozon возвращает 400 "value is required"
    если filter отсутствует или пустой. Примеры подтверждённые live:
      - ProductAPI_GetProductList — filter required
      - ProductAPI_GetProductAttributesV4 — filter required
      - FinanceAPI_FinanceTransactionListV3 — filter required (oneOf branch)
      - ListPostingCodes — filter required
      - WarehouseOZONList — warehouse_types required (min 1 item)
      - ReceiptsSellerList — page_size required (range 0..100)
    Никогда не отправляй пустой body в *.list методы — всегда включай хотя бы
    минимальный filter с пагинацией.
  severity: critical
  extracted_from: curated

# --- Cross-cutting findings from iter 1 audit (2026-04-12) ---

- title: Ozon runtime валидация строже чем swagger
  description: |
    Реальный validator на стороне Ozon часто требует поля, которые в swagger
    помечены как optional. Минимальный body, построенный по схеме, может всё
    равно вернуть 400. Примеры замеченные live: ProductAPI_GetProductList и
    ProductAPI_GetProductAttributesV4 требуют непустой filter, хотя в swagger
    нет required-маркера на filter. FinanceAPI_FinanceTransactionListV3 требует
    либо filter.date либо filter.posting_number (oneOf в swagger, но без
    верхнеуровневого required). Не доверяй полностью schema-driven генерации
    минимальных запросов — всегда читай method description.
  severity: warning
  extracted_from: curated

- title: Поля object часто бывают null в реальных ответах
  description: |
    Ozon API регулярно возвращает null в полях, которые swagger декларирует
    как обязательные object. Подтверждённые live случаи (iter 1, 2026-04-12):
    - SellerAPI_SellerInfo: ratings[].past_value
    - ProductAPI_GetProductInfoPrices: items[].marketing_actions.current_period_to (string)
    - WarehouseListV2: warehouses[].pause_at (string)
    - PostingAPI_GetFboPostingList: result[].financial_data
    - returnsList: returns[].compensation_status
    Это inconsistency на стороне Ozon, не баг swagger или MCP. Все парсеры
    ответов должны принимать null в любом nested object и не падать.
  severity: warning
  extracted_from: curated

