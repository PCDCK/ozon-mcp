- operation_id: ProductAPI_GetProductList
  api: seller
  title: Бизнес-контекст — отправная точка каталога
  description: >
    Список идентификаторов всех товаров кабинета (product_id и offer_id) —
    используется как первый шаг перед вытаскиванием полных данных через
    GetProductInfoList / GetProductInfoPrices / ProductInfoStocks.
  severity: info
  extracted_from: curated
  business_context: >
    Отправная точка для любой работы с каталогом товаров.
    Возвращает список product_id и offer_id всех товаров кабинета.
    Сам по себе содержит минимум данных — используется для получения
    идентификаторов, которые затем передаются в GetProductInfoList
    и GetProductInfoPrices для получения полных данных.
  when_to_use:
    - "Первый шаг при синхронизации каталога"
    - "Получение списка всех product_id для batch-запросов"
    - "Проверка общего количества товаров в кабинете"
  common_mistakes:
    - >
      Ожидать получить цены и остатки — этот метод возвращает только
      идентификаторы. Для полных данных нужен ProductAPI_GetProductInfoPrices.
    - >
      Не использовать ozon_fetch_all — по умолчанию возвращает
      только первую страницу (1000 товаров).

- operation_id: WarehouseListV2
  api: seller
  title: Бизнес-контекст — только FBS/rFBS склады
  description: >
    Возвращает FBS и rFBS склады продавца. FBO-склады принадлежат Ozon и
    в ответе не присутствуют — их наличие определяется по стокам товаров.
  severity: info
  extracted_from: curated
  business_context: >
    Возвращает список FBS и rFBS складов продавца.
    Важно: FBO-склады принадлежат Ozon и через этот метод
    не возвращаются. Используется для определения
    capability кабинета (есть ли у продавца FBS).
    Результат статичен — склады меняются редко.
  when_to_use:
    - "Определить схему работы кабинета (FBO/FBS/rFBS)"
    - "Получить warehouse_id для фильтрации остатков по складу"
    - "Проверить статус склада (active/disabled)"
  common_mistakes:
    - >
      Ожидать увидеть FBO-склады — они принадлежат Ozon и в ответе
      не присутствуют. Наличие FBO определяется по стокам товаров.
    - >
      Вызывать при каждом запросе — данные меняются редко,
      достаточно кэшировать на 24 часа.

- operation_id: SellerAPI_SellerInfo
  api: seller
  title: Бизнес-контекст — базовая информация о кабинете
  description: >
    Название компании, тип подписки и статус верификации. subscription.type
    определяет, какие методы API доступны этому кабинету.
  severity: info
  extracted_from: curated
  business_context: >
    Возвращает базовую информацию о кабинете продавца:
    название компании, тип подписки, статус верификации.
    Ключевое поле — subscription.type (PREMIUM_PRO,
    PREMIUM_PLUS, PREMIUM, STANDARD, LITE) — определяет
    какие методы Ozon API доступны этому кабинету.
  when_to_use:
