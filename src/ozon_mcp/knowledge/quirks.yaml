  title: Метод read-only несмотря на POST без read-маркеров
  description: |
    /v1/roles возвращает expires_at, список ролей и доступных методов.
    Никаких побочных эффектов. Heuristic classifier ошибочно помечает как write
    (POST без get/list/info в пути). Переопределён в safety_overrides.yaml.
    Live-verified 2026-04-13.
  severity: info
  extracted_from: curated

- operation_id: ProductAPI_GetProductInfoPrices
  api: seller
  title: visibility filter READY_TO_SUPPLY — superset, включает IN_SALE
  description: |
    Фильтр visibility=READY_TO_SUPPLY возвращает товары которые уже в продаже
    (IN_SALE) плюс те что готовы но ещё не продаются. Это superset, не exclusive.
    Для подсчёта "готово к продаже но не продаётся" считай total - in_sale.
    Live-verified 2026-04-13: READY_TO_SUPPLY=24, IN_SALE=16, разница=8.
  severity: warning
  extracted_from: curated

- operation_id: SellerAPI_SellerInfo
  api: seller
  title: tax_system USN не означает "без НДС" с 2025 года
  description: |
    С 2025 года в РФ ИП/ООО на УСН с оборотом >60 млн платят НДС по ставке
    5% или 7%. Поле tax_system=USN больше не равно "без НДС".
    Ставка НДС — атрибут товара (price.vat в /v5/product/info/prices),
    не компании. Не выводи "без НДС" автоматически по tax_system.
    Live-verified 2026-04-13: USN аккаунт с НДС 7% на товарах.
  severity: warning
  extracted_from: curated

- operation_id: SellerAPI_SellerInfo
  api: seller
  title: 403 "Company is blocked" — аккаунт заблокирован Ozon
  description: |
    При вызове /v1/seller/info на заблокированном аккаунте Ozon возвращает
    HTTP 403 с телом {"code":7,"message":"Company is blocked, please contact support"}.
    Это не проблема API-ключа — весь кабинет продавца заблокирован.
