# Method-specific quirks — things that surprise developers integrating Ozon API.
#
# Auto-extracted quirks (from method descriptions) get extracted_from: description.
# Hand-curated ones get extracted_from: curated.

- operation_id: FinanceAPI_FinanceTransactionListV3
  api: seller
  title: Период не больше 1 месяца
  description: |
    filter.date.from и filter.date.to не могут охватывать больше одного
    календарного месяца. Для исторической загрузки итерируй помесячно.
  severity: critical
  extracted_from: curated

- operation_id: FinanceAPI_FinanceTransactionListV3
  api: seller
  title: filter.date и filter.posting_number — взаимоисключающие
  description: |
    Схема использует oneOf — указывай ровно одно из двух. Если передать оба
    или ни одного, получишь 400.
  severity: critical
  extracted_from: curated

- operation_id: FinanceAPI_FinanceTransactionListV3
  api: seller
  title: Данные могут отставать от личного кабинета
  description: |
    Транзакции попадают в этот endpoint с задержкой агрегации до 24 часов.
    Если расхождение с ЛК ≤ 24h — это нормально, не баг.
  severity: warning
  extracted_from: description

- operation_id: PostingAPI_GetFbsPostingListV3
  api: seller
  title: has_next=true не всегда означает что есть ещё данные
  description: |
    Из описания: "has_next = true в ответе может значить, что вернули не весь
    массив отправлений". Иногда возвращает true, но следующий запрос с offset
    даёт пустой ответ. Останавливайся когда result.postings == [].
  severity: warning
  extracted_from: description

- operation_id: PostingAPI_GetFbsPostingListV3
  api: seller
  title: Регулярно обновляй информацию для актуальной даты отгрузки
  description: |
    Дата отгрузки меняется задним числом — перетягивай записи через
    last_changed_status_date или ReplacingMergeTree.
  severity: warning
  extracted_from: description

- operation_id: ProductAPI_GetProductList
  api: seller
  title: Максимум 1000 товаров за запрос
  description: |
    limit ≤ 1000. Если используешь filter.offer_id или filter.product_id —
    тоже не больше 1000 значений суммарно.
  severity: critical
  extracted_from: description

- operation_id: ProductAPI_GetProductInfoList
  api: seller
  title: Один запрос — одна группа идентификаторов
  description: |
    Передавай только offer_id ИЛИ product_id ИЛИ sku в одном запросе. Смешивать
    нельзя — Ozon вернёт 400.
  severity: critical
  extracted_from: description

- operation_id: AnalyticsAPI_AnalyticsGetData
  api: seller
  title: Без Premium доступны только 3 месяца истории
  description: |
    Для аккаунтов без Premium Plus глубина данных ограничена 3 месяцами и
    набор dimensions/metrics урезан. Premium Plus открывает год + расширенные
    метрики (показы, сессии, конверсии).
  severity: warning
  extracted_from: description

- operation_id: AnalyticsAPI_AnalyticsGetData
  api: seller
  title: Не больше 14 метрик за один запрос
  description: |
    metrics.length > 14 → ошибка InvalidArgument. Разделяй на несколько
    запросов и джойни на стороне клиента.
  severity: critical
  extracted_from: description

- operation_id: SubmitRequest
  api: performance
  title: Performance API асинхронный
  description: |
    POST /api/client/statistics возвращает только UUID запроса, не сам отчёт.
    Для получения данных дёргай status check + download endpoints. Формат
    ответа — CSV (или ZIP при нескольких кампаниях).
  severity: critical
  extracted_from: description

- operation_id: SubmitRequest
  api: performance
  title: Максимальный период — 62 дня
  description: |
    Поля from/to не могут охватывать больше 62 дней. Для исторической
    загрузки итерируй чанками по 60 дней.
  severity: critical
  extracted_from: description

- section: Premium-методы
  api: seller
  title: Все методы этой секции требуют Premium-подписку
  description: |
    Раздел "Premium-методы" доступен только при активной Premium / Premium Plus
    подписке. Без неё вернётся 403 с пустым телом.
  severity: warning
  extracted_from: curated

